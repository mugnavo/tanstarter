allowBuilds:
  esbuild: true

# https://pnpm.io/settings#minimumreleaseage
# https://pnpm.io/supply-chain-security#delay-dependency-updates
minimumReleaseAge: 1440

# Save exact versions to package.json instead of broad ranges
savePrefix: ""

catalog:
  vite: npm:@voidzero-dev/vite-plus-core@0.2.6
  vite-plus: 0.2.6
overrides:
  vite: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
  allowedVersions:
    vite: "*"
